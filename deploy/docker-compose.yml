services:
  mysql:
    image: mysql:8.0
    container_name: usta-mysql
    env_file: .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-usta_tennis}
      MYSQL_USER: ${MYSQL_USER:-usta_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - usta-net

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    container_name: usta-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-usta_tennis}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-usta_app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      LOGGING_LEVEL_COM_USTA_QUERY: INFO
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN
    deploy:
      resources:
        limits:
          memory: 650M
    restart: unless-stopped
    networks:
      - usta-net

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    container_name: usta-nginx
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped
    networks:
      - usta-net

  scraper:
    build:
      context: ..
      dockerfile: deploy/scraper/Dockerfile
    container_name: usta-scraper
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env.production
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-usta_tennis}
      DB_USER: ${MYSQL_USER:-usta_app}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SCRAPE_HEADLESS: "true"
      SCRAPE_STATE_DIR: /app/browser-state
      SCRAPE_DEBUG_DIR: /app/debug
      SCRAPER_CONCURRENCY: "2"
    volumes:
      - scraper_state:/app/browser-state
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - usta-net

volumes:
  mysql_data:
  scraper_state:

networks:
  usta-net:
    driver: bridge
